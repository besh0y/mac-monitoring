global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["127.0.0.1:9090"]

  # node_exporter — CPU / memory / disk / load / network for this Mac
  - job_name: "node"
    static_configs:
      - targets: ["127.0.0.1:9100"]
        labels:
          host: "mac"
